[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

# Netlify Functions (marketing site)
[functions]
  directory = "netlify/functions"

# Netlify Email Extension configuration
[emails]
  directory = "emails"

# Custom domain
[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/flowiq-light.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API routes for Netlify Functions (e.g. signup-notify)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Canonical: redirect https://flowiq.info (no www) to https://www.flowiq.info
[[redirects]]
  from = "https://flowiq.info/*"
  to = "https://www.flowiq.info/:splat"
  status = 301
  force = true

