# Signup should be served from ONE canonical file.
# `/signup` and `/signup/` should render the same page as `/signup/index.html`.
[[redirects]]
  from = "/signup"
  to = "/signup/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/signup/"
  to = "/signup/index.html"
  status = 200
  force = true

# Canonicalize legacy direct file access
[[redirects]]
  from = "/signup.html"
  to = "/signup"
  status = 301
  force = true

[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 301

[[redirects]]
  from = "/thank-you/"
  to = "/thank-you.html"
  status = 301

[[redirects]]
  from = "/landing.html"
  to = "/solutions/freight-logistics.html"
  status = 301

[[redirects]]
