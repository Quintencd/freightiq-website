;var safety=parseFloat(document.getElementById('safety').value)||0;var reorder=(weekly*lead)+safety;document.getElementById('result').textContent='Estimated reorder point: '+reorder.toLocaleString('en-ZA',{maximumFractionDigits:0})+' units';});})();</script><script>window.FlowIQAnalyticsConfig={gtmContainerId:'GTM-5L45DPGL',ga4MeasurementId:'G-1QJKZJ7V0T',clarityProjectId: 'vqjuz4ha1k'};</script><script src="/assets/website-analytics.js"></script><script src="/assets/growth-analytics.js"></script></body></html>
