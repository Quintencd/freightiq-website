<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Import Duty Calculator | FlowIQ</title><meta name="description" content="Estimate import duty and VAT based on customs value and duty rates." /><link rel="canonical" href="https://www.flowiq.info/tools/import-duty-calculator.html" /><link rel="icon" href="/favicon.ico"><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:Inter,sans-serif}.bg-freight-orange{background:#f97316}.hover\:bg-freight-orange-dark:hover{background:#ea580c}</style></head>
<body class="bg-slate-50 text-slate-900"><main class="max-w-3xl mx-auto px-4 py-10"><a href="/tools/" class="text-sm text-orange-600">Back to Tools</a><h1 class="text-3xl font-bold mt-4 mb-3">Import Duty Calculator</h1><p class="text-slate-600 mb-6">Estimate duty and VAT based on customs value and duty percentage.</p><section class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm mb-6"><div class="grid gap-4"><input id="customs" type="number" min="0" step="0.01" placeholder="Customs value" class="border rounded-lg px-3 py-2" /><input id="duty-rate" type="number" min="0" step="0.01" placeholder="Duty rate (%)" class="border rounded-lg px-3 py-2" /><input id="vat-rate" type="number" min="0" step="0.01" value="15" placeholder="VAT rate (%)" class="border rounded-lg px-3 py-2" /><button id="calc-submit" data-analytics-event="calculator_use" class="bg-freight-orange hover:bg-freight-orange-dark text-white rounded-lg py-3 font-semibold">Calculate</button></div><p id="result" class="mt-4 text-lg font-semibold text-orange-600"></p></section><section class="prose prose-slate max-w-none"><h2>Formula</h2><p>Duty = customs value x duty rate. VAT is estimated on (customs value + duty).</p><p><a href="/tools/import-cost-calculator.html">Import Cost Calculator</a> · <a href="/tools/landed-cost-calculator.html">Landed Cost Calculator</a></p></section><div class="mt-8 flex gap-3"><a href="/signup" data-analytics-event="trial_signup_click" class="bg-freight-orange hover:bg-freight-orange-dark text-white px-5 py-3 rounded-lg font-semibold">Start Free Trial</a><a href="/book-demo.html" data-analytics-event="demo_request" class="border border-slate-300 px-5 py-3 rounded-lg font-semibold">Book Demo</a></div></main><script>(function(){document.getElementById('calc-submit')?.addEventListener('click',function(){var customs=parseFloat(document.getElementById('customs').value)||0;var dr=(parseFloat(document.getElementById('duty-rate').value)||0)/100;var vr=(parseFloat(document.getElementById('vat-rate').value)||0)/100;var duty=customs*dr;var vat=(customs+duty)*vr;var total=duty+vat;document.getElementById('result').textContent='Estimated duty + VAT: R '+total.toLocaleString('en-ZA',{maximumFractionDigits:2});});})();</script><script>window.FlowIQAnalyticsConfig={gtmContainerId:'GTM-5L45DPGL',ga4MeasurementId:'G-1QJKZJ7V0T',clarityProjectId: 'vqjuz4ha1k'};</script><script src="/assets/website-analytics.js"></script><script src="/assets/growth-analytics.js"></script></body></html>
