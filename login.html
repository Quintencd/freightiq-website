<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to FlowIQ App Login</title>
  <meta http-equiv="refresh" content="0; url=https://app.flowiq.info/login">
  <script>
    (function () {
      var target = 'https://app.flowiq.info/login';
      var suffix = window.location.search + window.location.hash;
      window.location.replace(target + suffix);
    })();
  </script>
  <link rel="stylesheet" href="/flowiq-light.css?v=11">
  <style>
    body { font-family: Inter, system-ui, sans-serif; background:#0f172a; color:#e2e8f0; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .card { width:min(560px, calc(100vw - 32px)); background:#111827; border:1px solid rgba(249,115,22,.35); border-radius:20px; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
    a { color:#fb923c; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin:0 0 12px;font-size:28px;line-height:1.1;">Redirecting to the FlowIQ app login</h1>
    <p style="margin:0 0 8px;">Website login now hands off directly to the app so your session is created on the correct domain.</p>
    <p style="margin:0;">If nothing happens, <a href="https://app.flowiq.info/login">open the app login</a>.</p>
  </div>
</body>
</html>
